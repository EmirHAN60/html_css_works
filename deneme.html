<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>example_website</title>
    <link rel="stylesheet" href="deneme_stil.css">
</head>
<body>
    <div id="topContainer_div">
        <div class="top_div">
            <button class="english_btn">
                English
            </button>
            <input type="text" name="" id="" placeholder="Search the Knowledge Base">
            <button class="account_btn">
                Go to my account
            </button>
            <button class="demo_btn">
                Get a demo
            </button>
            <button class="starting_btn">
                Get started free
            </button>
        </div>
        <div class="secondTop_div">
            <b><p>HubSpot</p></b><p>Knowledge Base</p>
            <div class="combo_boxes">

                <b><p>Help Center</p></b>
                <b><p>Documentation</p></b>
                <b><p>Training</p></b>
                <b><p>Community</p></b>
                <b><p>Blogs</p></b>
                
            </div>
            
        </div>
        <div class="hero_div">
            <h1>Search the Knowledge Base</h1>
            <input type="text">
        </div>
    </div>

    <div class="articles_section">
    
        <h3 id="articles_title">Highest rated articles</h3>
        
        <div id="mid_div">
            <div class="articlesDiv_1">
                <button>Connect your personal email</button>
                <button>Import records and activities</button>
                <button>Add HubSpot users</button>
                <button>HubSpot billing and payment | Frequently Asked Questions</button>
            </div>
            <div class="articlesDiv_2">
                <button>Connect your domain to HubSpot</button>
                <button>HubSpot's default contact properties</button>
                <button>Choose your workflow actions</button>
                <button>Academy certifications | Frequently Asked Questions</button>
            </div>
        </div>
    </div>
</body>
</html>
